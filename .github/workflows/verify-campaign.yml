name: Verify demo campaign

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  verify-campaign:
    runs-on: ubuntu-latest
    # verify:campaign is pure Node (parser + map generator via esbuild, no
    # browser at all) — skip Playwright's postinstall browser download, which
    # `npm ci` would otherwise trigger for nothing.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify:campaign
